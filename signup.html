<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Sign Up</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Improved Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex !important;
        }

        .modal-content {
            background: var(--surface, #ffffff);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            animation: modalSlideIn 0.3s ease;
            border: 1px solid var(--border, #e2e8f0);
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border, #e2e8f0);
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary, #0f172a);
            margin: 0;
        }

        .close-modal {
            font-size: 24px;
            font-weight: 500;
            color: var(--text-muted, #64748b);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: var(--surface-2, #f1f5f9);
            color: var(--danger, #ef4444);
        }

        .policy-modal-body {
            padding: 24px;
            overflow-y: auto;
            max-height: 50vh;
            line-height: 1.6;
            color: var(--text-secondary, #475569);
        }

        .policy-modal-body h4 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary, #0f172a);
            margin: 0 0 16px 0;
        }

        .policy-modal-body h5 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary, #0f172a);
            margin: 20px 0 10px 0;
        }

        .policy-modal-body p {
            font-size: 14px;
            margin-bottom: 12px;
        }

        .policy-modal-body ul {
            margin: 10px 0 20px 20px;
        }

        .policy-modal-body li {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .modal-actions {
            padding: 20px 24px;
            border-top: 1px solid var(--border, #e2e8f0);
            display: flex;
            justify-content: flex-end;
        }

        .modal-actions .cancel-btn {
            padding: 10px 24px;
            background: var(--surface-2, #f1f5f9);
            color: var(--text-primary, #0f172a);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-actions .cancel-btn:hover {
            background: var(--border, #e2e8f0);
        }

        /* Dark mode support */
        body.dark-mode .modal-content {
            background: var(--surface, #1a1f2c);
            border-color: var(--border, #2d3648);
        }

        body.dark-mode .modal-header {
            border-bottom-color: var(--border, #2d3648);
        }

        body.dark-mode .modal-header h3 {
            color: var(--text-primary, #f1f5f9);
        }

        body.dark-mode .close-modal {
            color: var(--text-muted, #64748b);
        }

        body.dark-mode .close-modal:hover {
            background: var(--surface-2, #262d3e);
        }

        body.dark-mode .policy-modal-body {
            color: var(--text-secondary, #94a3b8);
        }

        body.dark-mode .policy-modal-body h4,
        body.dark-mode .policy-modal-body h5 {
            color: var(--text-primary, #f1f5f9);
        }

        body.dark-mode .modal-actions {
            border-top-color: var(--border, #2d3648);
        }

        body.dark-mode .modal-actions .cancel-btn {
            background: var(--surface-2, #262d3e);
            color: var(--text-primary, #f1f5f9);
        }

        body.dark-mode .modal-actions .cancel-btn:hover {
            background: var(--border, #2d3648);
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <!-- Main container -->
    <div class="container">
        <!-- Signup card -->
        <div class="login-card">
            <!-- Logo section -->
            <div class="logo-wrapper">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h2>ExpenseTracker</h2>
            </div>

            <!-- Header section -->
            <div class="header">
                <h1>Create account</h1>
                <p>Start managing your finances today</p>
            </div>

            <!-- Signup form -->
            <form id="signupForm" class="login-form" novalidate>
                <!-- Name field -->
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="input-field">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="Enter your full name"
                            required
                        >
                        <div class="input-highlight"></div>
                        <div class="error-message" id="nameError"></div>
                    </div>
                </div>

                <!-- Email field -->
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="input-field">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                        <div class="input-highlight"></div>
                        <div class="error-message" id="emailError"></div>
                    </div>
                </div>

                <!-- Password field -->
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="input-field">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Create a password"
                                required
                            >
                            <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="input-highlight"></div>
                        <div class="error-message" id="passwordError"></div>
                        <!-- Password strength indicator -->
                        <div class="password-strength" id="passwordStrength"></div>
                    </div>
                </div>

                <!-- Confirm Password field -->
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="input-field">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                placeholder="Confirm your password"
                                required
                            >
                            <button type="button" class="toggle-password" id="toggleConfirmPassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="input-highlight"></div>
                        <div class="error-message" id="confirmPasswordError"></div>
                    </div>
                </div>

                <!-- Terms and conditions checkbox -->
                <div class="form-options">
                    <label class="remember-checkbox">
                        <input type="checkbox" id="terms" required>
                        <span class="checkbox-custom"></span>
                        <span class="checkbox-label">
                            I agree to the 
                            <a href="#" id="termsLink">Terms</a> 
                            and 
                            <a href="#" id="privacyLink">Privacy Policy</a>
                        </span>
                    </label>
                </div>

                <!-- Signup button -->
                <button type="submit" class="login-btn" id="signupBtn">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </span>
                </button>
            </form>

            <!-- Login link -->
            <p class="signup-text">
                Already have an account? 
                <a href="index.html" id="loginLink">Sign in</a>
            </p>
        </div>
    </div>

    <!-- Terms and Privacy Policy Modal -->
    <div id="policyModal" class="modal">
        <div class="modal-content policy-modal-content">
            <div class="modal-header">
                <h3 id="policyModalTitle">Terms & Conditions</h3>
                <span class="close-modal" id="closePolicyModal">&times;</span>
            </div>
            <div class="policy-modal-body" id="policyModalBody">
                <!-- Content will be loaded dynamically -->
            </div>
            <div class="modal-actions">
                <button type="button" class="cancel-btn" id="closePolicyBtn">Close</button>
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script type="import">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        window.initializeApp = initializeApp;
        window.getAuth = getAuth;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
    </script>

    <script type="module" src="js/auth-errors.js"></script>
    <script type="module" src="js/signup.js"></script>

    <!-- Improved Modal Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log("🚀 Setting up Terms & Privacy modal...");
            
            // Get elements
            const modal = document.getElementById('policyModal');
            const modalTitle = document.getElementById('policyModalTitle');
            const modalBody = document.getElementById('policyModalBody');
            const closeBtn = document.getElementById('closePolicyModal');
            const closeFooterBtn = document.getElementById('closePolicyBtn');
            const termsLink = document.getElementById('termsLink');
            const privacyLink = document.getElementById('privacyLink');
            
            console.log("Elements found:", {
                modal: !!modal,
                modalTitle: !!modalTitle,
                modalBody: !!modalBody,
                closeBtn: !!closeBtn,
                closeFooterBtn: !!closeFooterBtn,
                termsLink: !!termsLink,
                privacyLink: !!privacyLink
            });
            
            // Terms content
            const termsContent = `
                <h4>Terms and Conditions</h4>
                <p>Last updated: ${new Date().toLocaleDateString()}</p>
                
                <h5>1. Acceptance of Terms</h5>
                <p>By accessing and using this Expense Tracker application, you agree to be bound by these Terms and Conditions.</p>
                
                <h5>2. User Accounts</h5>
                <p>You are responsible for maintaining the confidentiality of your account and for all activities under your account.</p>
                
                <h5>3. Data Usage</h5>
                <p>We store your expense data securely using Firebase. Your data is used only to provide you with the expense tracking service.</p>
                
                <h5>4. Privacy</h5>
                <p>Your information is handled according to our Privacy Policy. We do not share your data with third parties.</p>
                
                <h5>5. Service Availability</h5>
                <p>We strive to maintain high availability but do not guarantee uninterrupted or error-free service.</p>
            `;
            
            // Privacy content
            const privacyContent = `
                <h4>Privacy Policy</h4>
                <p>Last updated: ${new Date().toLocaleDateString()}</p>
                
                <h5>1. Information We Collect</h5>
                <ul>
                    <li><strong>Personal Information:</strong> Your name and email address</li>
                    <li><strong>Financial Data:</strong> Expense amounts, categories, descriptions, and dates</li>
                </ul>
                
                <h5>2. How We Use Your Information</h5>
                <ul>
                    <li>Create and manage your account</li>
                    <li>Display your expense dashboard and analytics</li>
                    <li>Generate reports and exports</li>
                </ul>
                
                <h5>3. Data Storage</h5>
                <p>All data is securely stored in Firebase Cloud Firestore with encryption.</p>
                
                <h5>4. Data Sharing</h5>
                <p>We do not sell or share your personal information with third parties.</p>
                
                <h5>5. Your Rights</h5>
                <p>You can access, export, modify, or delete your data at any time through the dashboard.</p>
            `;
            
            // Function to open modal
            function openModal(title, content) {
                console.log("Opening modal with title:", title);
                modalTitle.textContent = title;
                modalBody.innerHTML = content;
                modal.classList.add('show');
                modal.style.display = 'flex'; // Fallback
            }
            
            // Function to close modal
            function closeModal() {
                console.log("Closing modal");
                modal.classList.remove('show');
                modal.style.display = 'none';
            }
            
            // Terms link click
            if (termsLink) {
                termsLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    openModal('Terms & Conditions', termsContent);
                });
            }
            
            // Privacy link click
            if (privacyLink) {
                privacyLink.addEventListener('click', function(e) {
                    e.preventDefault();
                    openModal('Privacy Policy', privacyContent);
                });
            }
            
            // Close button click
            if (closeBtn) {
                closeBtn.addEventListener('click', closeModal);
            }
            
            // Close footer button click
            if (closeFooterBtn) {
                closeFooterBtn.addEventListener('click', closeModal);
            }
            
            // Click outside to close
            window.addEventListener('click', function(event) {
                if (event.target === modal) {
                    closeModal();
                }
            });
            
            // Escape key to close
            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape' && modal.classList.contains('show')) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
