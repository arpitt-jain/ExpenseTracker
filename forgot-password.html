<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Additional styles for reset pages */
        .reset-message {
            text-align: center;
            padding: 20px;
            background: var(--success-bg, #ecfdf5);
            border: 1px solid var(--success, #059669);
            border-radius: var(--radius-md);
            color: var(--success, #059669);
            margin: 20px 0;
        }
        
        .reset-message i {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }
        
        .reset-message h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .reset-message p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .info-text {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 15px;
            text-align: center;
        }
        
        .back-to-login {
            display: inline-block;
            margin-top: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .back-to-login:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <div class="container">
        <div class="login-card">
            <div class="logo-wrapper">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h2>ExpenseTracker</h2>
            </div>

            <div class="header">
                <h1>Forgot Password</h1>
                <p>Enter your email to reset your password</p>
            </div>

            <!-- Forgot Password Form -->
            <form id="forgotPasswordForm" class="login-form">
                <div class="input-group">
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div class="input-field">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="Enter your registered email"
                            required
                        >
                        <div class="input-highlight"></div>
                        <div class="error-message" id="emailError"></div>
                    </div>
                </div>

                <!-- Success Message (hidden by default) -->
                <div id="successMessage" class="reset-message" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    <h3>Check Your Email</h3>
                    <p>We've sent a password reset link to your email address.</p>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="login-btn" id="resetBtn">
                    <span class="btn-text">Send Reset Link</span>
                    <span class="btn-loader" style="display: none;">
                        <i class="fas fa-circle-notch fa-spin"></i>
                    </span>
                </button>

                <p class="info-text">
                    You'll receive an email with a link to reset your password.
                </p>

                <!-- Back to Login Link -->
                <p class="signup-text">
                    <a href="index.html" id="backToLogin">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </p>
            </form>
        </div>
    </div>

    <script type="import">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getAuth, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
        
        window.initializeApp = initializeApp;
        window.getAuth = getAuth;
        window.sendPasswordResetEmail = sendPasswordResetEmail;
    </script>
    
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth-errors.js"></script>
    <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
